        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --card: rgba(255, 255, 255, 0.94);
            --card-strong: #ffffff;
            --line: rgba(0, 91, 172, 0.08);
            --brand: #005BAC;
            --brand-deep: #003D7A;
            --brand-light: #E6F3FF;
            --navy: #003D7A;
            --teal: #008DD2;
            --red: #EF4444;
            --green: #12B76A;
            --gold: #F59E0B;
            --bg-a: #F5F7FA;
            --bg-b: #FFFFFF;
            --bg-c: #EEF2F7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 91, 172, 0.08), transparent 30%),
                radial-gradient(circle at top right, rgba(0, 141, 210, 0.05), transparent 26%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b) 50%, var(--bg-c));
        }

        h1, h2, h3, h4, h5 {
            font-family: "Manrope", sans-serif;
            letter-spacing: -0.02em;
        }

        .shell-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 60px rgba(0, 91, 172, 0.06);
            backdrop-filter: blur(20px);
        }

        .soft-card {
            background: var(--card-strong);
            border: 1px solid var(--line);
            box-shadow: 0 10px 24px rgba(0, 91, 172, 0.04);
        }

        .nav-pill {
            transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
        }

        .nav-pill:hover {
            transform: translateY(-1px);
        }

        .page-enter {
            animation: riseIn 0.32s ease;
        }

        .modal-rise {
            animation: modalRise 0.24s ease;
        }

        .fade-in {
            animation: fadeIn 0.18s ease;
        }

        .progress-track {
            background: rgba(0, 91, 172, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
        }

        .mobile-safe {
            padding-bottom: calc(env(safe-area-inset-bottom) + 0.75rem);
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes modalRise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .scroll-hidden::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

        function currentUser() {
            return users.find((user) => user.id === state.currentUserByRole[state.role]);

        function openRoleSwitcher() {
            const modal = document.getElementById("roleModal");
            const list = document.getElementById("roleList");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            list.innerHTML = Object.values(roles).map((r) => `
                <button onclick="switchRole('${r.id}')" class="w-full flex items-center gap-3 p-3 rounded-2xl hover:bg-slate-50 ${state.role === r.id ? 'bg-blue-50 border border-blue-200' : ''}">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-white text-sm font-bold ${r.accent}">
                        <i class="fa-solid ${r.icon}"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <p class="font-semibold text-slate-900 text-sm">${r.name}</p>
                        <p class="text-xs text-slate-400">${r.short}</p>
                    </div>
                    ${state.role === r.id ? '<div class="w-6 h-6 bg-[#005BAC] rounded-full flex items-center justify-center"><i class="fa-solid fa-check text-white text-xs"></i></div>' : ''}
                </button>
            `).join("");
        }

        function closeRoleSwitcher() {
            const modal = document.getElementById("roleModal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        document.getElementById("roleModal").addEventListener("click", (e) => {
            if (e.target.id === "roleModal") closeRoleSwitcher();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeRoleSwitcher();
        });

        function switchRole(newRole) {
            state.role = newRole;
            // Update the UI to show the checkmark on the selected role immediately
            openRoleSwitcher();
            
            // Wait briefly so the user sees the effect before the modal closes
            setTimeout(() => {
                state.page = roles[newRole].pages[0].id;
                closeRoleSwitcher();
                render();
                showToast("Switched to " + roles[newRole].name);
                window.scrollTo({ top: 0, behavior: "smooth" });
            }, 250);
        }

        function scopedBranchIds() {
            const user = currentUser();
            if (!user) return [];
            if (state.role === "manager") return user.branchScope;
            if (state.role === "rm") return branches.map((branch) => branch.id);
            return [user.branchId];
        }

        function scopedBranches() {
            const ids = scopedBranchIds();
            return branches.filter((branch) => ids.includes(branch.id));
        }

        function scopedUsers() {
            const ids = scopedBranchIds();
            return users.filter((user) => ids.includes(user.branchId) || user.id === currentUser().id);
        }

        function scopedTasks() {
            const ids = scopedBranchIds();
            return tasks.filter((task) => ids.includes(task.branchId));
        }

        function scopedComplaints() {
            const ids = scopedBranchIds();
            return complaints.filter((complaint) => ids.includes(complaint.branchId));
        }

        function scopedApprovals() {
            const ids = scopedBranchIds();
            return approvals.filter((approval) => ids.includes(approval.branchId));
        }

        function scopedAppliances() {
            const ids = scopedBranchIds();
            return appliances.filter((appliance) => ids.includes(appliance.branchId));
        }

        function scopedNotifications() {
            return notifications.filter((item) => item.scope.includes(state.role));
        }

        function scopedAttendance() {
            const ids = scopedBranchIds();
            return attendanceLog.filter((entry) => {
                const person = users.find((user) => user.id === entry.userId);
                return person && ids.includes(person.branchId);
            });
        }

        function getBranch(id) {
            return branches.find((branch) => branch.id === id);
        }

        function getUser(id) {
            return users.find((user) => user.id === id);
        }

        function getTask(id) {
            return tasks.find((task) => task.id === id);
        }

        function getComplaint(id) {
            return complaints.find((item) => item.id === id);
        }

        function getAppliance(id) {
            return appliances.find((item) => item.id === id);
        }

        function updateBranchPeopleCount(branchId, role) {
            const branch = getBranch(branchId);
            if (!branch) return;
            branch.staffCount += 1;
            if (role === "worker") branch.workerCount += 1;
            if (role === "employee") branch.employeeCount += 1;
        }

        function formatMoney(value) {
            return "Rs " + Number(value).toLocaleString("en-IN");
        }

        function formatPct(value) {
            return value + "%";
        }

        function countdown(deadline) {
            const diff = new Date(deadline).getTime() - new Date(state.now).getTime();
            if (diff <= 0) return "Overdue";
            const mins = Math.floor(diff / 60000);
            const hrs = Math.floor(mins / 60);
            const rem = mins % 60;
            return hrs > 0 ? hrs + "h " + rem + "m left" : rem + "m left";

        function renderSearchResults(query) {
            const q = query.trim().toLowerCase();
            const results = [];
            if (q) {
                tasks.forEach((task) => { if (task.title.toLowerCase().includes(q)) results.push({ label: task.title, meta: "Task", action: `openTaskDetail(${task.id})` }); });
                users.forEach((user) => { if (user.name.toLowerCase().includes(q)) results.push({ label: user.name, meta: "User", action: `openUserDetail(${user.id})` }); });
                branches.forEach((branch) => { if (branch.name.toLowerCase().includes(q)) results.push({ label: branch.name, meta: "Branch", action: `openBranchDetail(${branch.id})` }); });
                complaints.forEach((item) => { if (item.title.toLowerCase().includes(q)) results.push({ label: item.title, meta: "Complaint", action: `openComplaintDetail(${item.id})` }); });
                appliances.forEach((item) => { if (item.name.toLowerCase().includes(q)) results.push({ label: item.name, meta: "Appliance", action: `openApplianceDetail(${item.id})` }); });
            }
            document.getElementById("searchResults").innerHTML = results.length ? results.map((item) => `
                <button onclick="${item.action}" class="w-full rounded-2xl bg-slate-50 p-4 text-left">
                    <strong class="block text-slate-900">${item.label}</strong>

                deviceId: "USR-" + (users.length + 1)
            });
            if (["worker", "employee", "am"].includes(role)) updateBranchPeopleCount(branchId, role);
            if (fromModal) closeModal();
            showToast("User created");
            render();
        }

        function saveSettings() {
            settings.geoRadius = Number(document.getElementById("settingGeo").value);
            settings.workerEscalationMins = Number(document.getElementById("settingWorkerEsc").value);
            settings.employeeEscalationMins = Number(document.getElementById("settingEmployeeEsc").value);
            settings.criticalAlertRule = document.getElementById("settingCriticalRule").value;
            settings.deadlineRule = document.getElementById("settingDeadlineRule").value;
            showToast("Settings updated");
            render();
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.remove("hidden");
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.add("hidden"), 2200);
        }

        function render() {
            renderTopbar();
            renderSidebar();
            renderMain();
            renderMobileNav();
        }

        document.getElementById("modalRoot").addEventListener("click", (event) => {
            if (event.target.id === "modalRoot") closeModal();
        });

        document.addEventListener("DOMContentLoaded", render);
    </script>
</body>
</html>
